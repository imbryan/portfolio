services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    command: >
      sh -c "
      npm run dev &&
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./db:/db
      - ./staticfiles:/app/staticfiles
    ports:
      - 8000:8000
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/db/db.sqlite3
